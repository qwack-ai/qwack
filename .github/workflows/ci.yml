name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - name: Test shared
        run: bun test --cwd packages/qwack-shared
      - name: Test plugin
        run: bun test --cwd packages/qwack-plugin
      - name: Test server
        run: bun test --cwd packages/qwack-server
        env:
          QWACK_DEV: "true"

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - name: Build all platforms
        run: bun run script/build.ts
        working-directory: packages/opencode
      - name: Verify binaries exist
        run: |
          test -f packages/opencode/dist/opencode-linux-x64/bin/qwack
          test -f packages/opencode/dist/opencode-darwin-arm64/bin/qwack
          test -f packages/opencode/dist/opencode-windows-x64/bin/qwack.exe
          echo "All platform binaries built successfully"
