name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      stage:
        description: "Deployment stage"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - production

# Only one deploy at a time
concurrency:
  group: deploy-${{ github.event.inputs.stage || 'dev' }}
  cancel-in-progress: false

permissions:
  id-token: write # OIDC token for AWS auth
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - name: Test server
        run: bun test --cwd packages/qwack-server
        env:
          QWACK_DEV: "true"

  deploy:
    needs: test
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.stage || 'dev' }}
    env:
      STAGE: ${{ github.event.inputs.stage || 'dev' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1


      - name: Deploy with SST
        run: npx sst deploy --stage "$STAGE"
